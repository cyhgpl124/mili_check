name: milicheck
description: "Security check application with Clean Architecture"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.4.0-268.0.dev <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.6

  # 상태 관리 및 라우팅
  flutter_bloc: ^8.1.3
  equatable: ^2.0.5
  go_router: ^12.1.3

  # 의존성 주입 (DI)
  get_it: ^7.6.4
  injectable: ^2.3.2

  # 로컬 DB 및 데이터 암호화 (핵심 원칙: sqlite3 대신 sqlcipher 사용)
  drift: ^2.14.1
  sqlcipher_flutter_libs: ^0.6.8
  path_provider: ^2.1.1
  path: ^1.8.3

  # 보안 및 데이터 모델링
  flutter_secure_storage: ^9.0.0
  freezed_annotation: ^2.4.4
  json_annotation: ^4.8.1
  logger: ^2.0.2+1

  # [기존 업로드 파일 유지 요소]
  firebase_core: ^2.24.2
  firebase_auth: ^4.15.3
  firebase_messaging: ^14.7.9
  google_sign_in: ^6.1.6
  google_generative_ai: ^0.2.0
  flutter_screenutil: ^5.9.0
  flex_color_scheme: ^7.3.1
  intl: ^0.19.0
  flutter_blue_plus: ^1.28.2
  geolocator: ^10.1.0
  fl_chart: ^0.66.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

  # 코드 생성 도구
  build_runner: ^2.4.7
  injectable_generator: ^2.4.1
  drift_dev: ^2.14.1
  freezed: ^2.4.5
  json_serializable: ^6.7.1

flutter:
  uses-material-design: true